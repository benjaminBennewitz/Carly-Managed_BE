components:
  schemas:
    AccessibilitySettingsRequest:
      type: object
      description: Validiert alle barrierebezogenen Einstellungen.
      properties:
        colorVisionMode:
          $ref: '#/components/schemas/ColorVisionModeEnum'
        neuroMode:
          type: boolean
        reduceMotion:
          type: boolean
        reduceHover:
          type: boolean
        magnifier:
          type: boolean
        fontSize:
          $ref: '#/components/schemas/FontSizeEnum'
        highContrast:
          type: boolean
    AppSettings:
      type: object
      description: Entspricht dem AppSettings-Interface des Angular-Frontends.
      properties:
        accessibility:
          type: object
          additionalProperties: {}
          description: Bündelt persistierte Barrierefreiheitsfelder.
          readOnly: true
        general:
          type: object
          additionalProperties: {}
          description: Bündelt allgemeine Einstellungen und Alarmkategorien.
          readOnly: true
        tools:
          type: object
          additionalProperties: {}
          description: Bündelt optionale Werkzeugzustände.
          readOnly: true
        version:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - accessibility
      - general
      - tools
    Attachment:
      type: object
      description: Gibt nur Metadaten und eine geschützte Download-URL aus.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
        uploadedBy:
          type: object
          additionalProperties: {}
          nullable: true
          description: Liefert den hochladenden Nutzer.
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        downloadUrl:
          type: string
          description: Erzeugt eine API-URL, die erneut Berechtigungen prüft.
          readOnly: true
      required:
      - createdAt
      - downloadUrl
      - fileName
      - id
      - mimeType
      - sizeBytes
      - uploadedBy
    AttachmentRequest:
      type: object
      description: Gibt nur Metadaten und eine geschützte Download-URL aus.
      properties:
        fileName:
          type: string
          minLength: 1
        mimeType:
          type: string
          minLength: 1
        sizeBytes:
          type: integer
      required:
      - fileName
      - mimeType
      - sizeBytes
