      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        boardId:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 120
          minLength: 2
        trigger:
          $ref: '#/components/schemas/TriggerEnum'
        conditions: {}
        actions: {}
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        version:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - boardId
      - createdAt
      - id
      - isActive
      - name
      - sortOrder
      - trigger
      - updatedAt
