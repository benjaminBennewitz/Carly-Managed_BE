openapi: 3.0.3
info:
  title: Carly Managed API
  version: 1.1.0
  description: REST-API für Carly Managed mit Session-Authentifizierung und WebSockets.
paths:
  /api/v1/auth/csrf/:
    get:
      operationId: auth_csrf_retrieve
      description: Liefert den Token zusätzlich für leichtes lokales Debugging.
      tags:
      - auth
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/email/verify/confirm/:
    post:
      operationId: auth_email_verify_confirm_create
      description: Markiert die Adresse nach erfolgreichem Tokenverbrauch als bestätigt.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
  /api/v1/auth/email/verify/request/:
    post:
      operationId: auth_email_verify_request_create
      description: Versendet nur bei noch nicht bestätigter Adresse eine Nachricht.
      tags:
      - auth
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Startet bei gültigen Zugangsdaten eine Sitzung.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Löscht Sitzung und Authentifizierungsdaten.
      tags:
      - auth
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Liefert den aktuellen Nutzer zur Sitzungswiederherstellung.
      tags:
      - auth
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: Aktualisiert ausschließlich freigegebene Profildaten.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCurrentUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCurrentUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCurrentUserRequest'
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: Setzt ein neues Passwort und erhält nur die aktuelle Sitzung.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Ändert das Passwort und hebt bestehende Sperren auf.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/auth/password/reset/request/:
    post:
      operationId: auth_password_reset_request_create
      description: Antwortet unabhängig vom Kontobestand identisch.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOnlyRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Validiert und persistiert eine Registrierung atomar.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
  /api/v1/demo/reset/:
    post:
      operationId: demo_reset_create
      description: Erzeugt den reproduzierbaren Ausgangsstand in einer Transaktion
        neu.
      tags:
      - demo
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoResetResult'
          description: ''
  /api/v1/demo/status/:
    get:
      operationId: demo_status_retrieve
      description: Bewertet Feature-Flag, Umgebung und Staff-Status ohne Seiteneffekt.
      tags:
      - demo
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoStatus'
          description: ''
  /api/v1/inbox/conversations/:
    get:
      operationId: inbox_conversations_list
      description: Verwaltet Gespräche ausschließlich für aktive Teilnehmende.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Eine Seitenzahl in der paginierten Ergebnismenge.
        schema:
          type: integer
      - name: pageSize
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationList'
          description: ''
    post:
      operationId: inbox_conversations_create
      description: Erstellt ein Gespräch in einem zugänglichen Workspace.
      tags:
      - inbox
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConversationCreateRequest'
        required: true
      security:
      - sessionCookie: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationCreate'
          description: ''
  /api/v1/inbox/conversations/{id}/:
    get:
      operationId: inbox_conversations_retrieve
      description: Liest das Gespräch und aktualisiert den persönlichen Lesestand.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der conversation identifiziert.
        required: true
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    delete:
      operationId: inbox_conversations_destroy
      description: Verlässt ein Gespräch, statt es für andere zu löschen.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der conversation identifiziert.
        required: true
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/inbox/conversations/{id}/messages/:
    post:
      operationId: inbox_conversations_messages_create
      description: Sendet eine neue Nachricht in das Gespräch.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der conversation identifiziert.
        required: true
      tags:
      - inbox
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
  /api/v1/inbox/conversations/{id}/participants/:
    post:
      operationId: inbox_conversations_participants_create
      description: Fügt Teilnehmende hinzu oder entfernt sie unter Versionskontrolle.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der conversation identifiziert.
        required: true
      tags:
      - inbox
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    delete:
      operationId: inbox_conversations_participants_destroy
      description: Fügt Teilnehmende hinzu oder entfernt sie unter Versionskontrolle.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der conversation identifiziert.
        required: true
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/inbox/notifications/:
    get:
      operationId: inbox_notifications_list
      description: Listet, liest und entfernt persönliche Systembenachrichtigungen.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Eine Seitenzahl in der paginierten Ergebnismenge.
        schema:
          type: integer
      - name: pageSize
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSystemNotificationList'
          description: ''
  /api/v1/inbox/notifications/{id}/:
    get:
      operationId: inbox_notifications_retrieve
      description: Listet, liest und entfernt persönliche Systembenachrichtigungen.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der system notification identifiziert.
        required: true
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemNotification'
          description: ''
    delete:
      operationId: inbox_notifications_destroy
      description: Listet, liest und entfernt persönliche Systembenachrichtigungen.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der system notification identifiziert.
        required: true
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/inbox/notifications/{id}/mark-read/:
    post:
      operationId: inbox_notifications_mark_read_create
      description: Markiert eine Benachrichtigung als gelesen.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der system notification identifiziert.
        required: true
      tags:
      - inbox
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
        required: true
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemNotification'
          description: ''
  /api/v1/inbox/notifications/clear/:
    delete:
      operationId: inbox_notifications_clear_destroy
      description: Löscht alle persönlichen Systembenachrichtigungen.
      tags:
      - inbox
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/inbox/notifications/mark-all-read/:
    post:
      operationId: inbox_notifications_mark_all_read_create
      description: Markiert alle offenen Benachrichtigungen als gelesen.
      tags:
      - inbox
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
        required: true
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemNotification'
          description: ''
  /api/v1/preferences/carly/:
    get:
      operationId: preferences_carly_retrieve
      description: Liefert Einstellungen und Fortschritt.
      tags:
      - preferences
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarlyState'
          description: ''
    patch:
      operationId: preferences_carly_partial_update
      description: Ändert ausschließlich freigegebene Carly-Einstellungen.
      tags:
      - preferences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCarlySettingsWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCarlySettingsWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCarlySettingsWriteRequest'
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarlyState'
          description: ''
    delete:
      operationId: preferences_carly_destroy
      description: Setzt Carly zurück, ohne andere Kontodaten zu verändern.
      tags:
      - preferences
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarlyState'
          description: ''
  /api/v1/preferences/carly/actions/{action}/:
    post:
      operationId: preferences_carly_actions_create
      description: Validiert Parameter, Cooldown, Tageslimit und Versionsstand.
      parameters:
      - in: path
        name: action
        schema:
          type: string
        required: true
      tags:
      - preferences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarlyActionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarlyActionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarlyActionRequest'
        required: true
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarlyState'
          description: ''
  /api/v1/preferences/settings/:
    get:
      operationId: preferences_settings_retrieve
      description: Liefert den vollständigen Einstellungszustand.
      tags:
      - preferences
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
          description: ''
    patch:
      operationId: preferences_settings_partial_update
      description: Aktualisiert partielle verschachtelte Einstellungen.
      tags:
      - preferences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAppSettingsWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAppSettingsWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAppSettingsWriteRequest'
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
          description: ''
    delete:
      operationId: preferences_settings_destroy
      description: Setzt die Einstellungen atomar auf sichere Standardwerte zurück.
      tags:
      - preferences
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
          description: ''
  /api/v1/workspaces/:
    get:
      operationId: workspaces_list
      description: Liest zugängliche Workspaces und verwaltet deren Mitglieder.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      tags:
      - workspaces
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
          description: ''
  /api/v1/workspaces/{id}/:
    get:
      operationId: workspaces_retrieve
      description: Liest zugängliche Workspaces und verwaltet deren Mitglieder.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der workspace identifiziert.
        required: true
      tags:
      - workspaces
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: ''
  /api/v1/workspaces/{id}/members/:
    get:
      operationId: workspaces_members_retrieve
      description: Listet Mitglieder oder ändert Rolle und Avatarfarbe eines Mitglieds.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der workspace identifiziert.
        required: true
      tags:
      - workspaces
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: ''
    patch:
      operationId: workspaces_members_partial_update
      description: Listet Mitglieder oder ändert Rolle und Avatarfarbe eines Mitglieds.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der workspace identifiziert.
        required: true
      tags:
      - workspaces
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedWorkspaceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedWorkspaceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedWorkspaceRequest'
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: ''
    delete:
      operationId: workspaces_members_destroy
      description: Listet Mitglieder oder ändert Rolle und Avatarfarbe eines Mitglieds.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Ein UUID-String, der workspace identifiziert.
        required: true
      tags:
      - workspaces
      security:
      - sessionCookie: []
      responses:
        '204':
          description: No response body
  /api/v1/workspaces/attachments/{attachment_id}/download/:
    get:
      operationId: workspaces_attachments_download_retrieve
      description: Streamt die Datei mit sicherem Content-Disposition-Header.
      parameters:
      - in: path
        name: attachment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - workspaces
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
  /api/v1/workspaces/automations/:
    get:
      operationId: workspaces_automations_list
      description: Verwaltet begrenzte serverseitige Board-Automationen.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Eine Seitenzahl in der paginierten Ergebnismenge.
        schema:
          type: integer
      - name: pageSize
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      tags:
      - workspaces
      security:
      - sessionCookie: []
      responses:
        '200':
          content:
            application/json:
              schema:
